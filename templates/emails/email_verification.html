<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificá tu email</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px; background: #fafafa; }
        .container { background: #fff; border-radius: 12px; padding: 40px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .cta { display: inline-block; background: #4f46e5; color: #fff !important; padding: 14px 32px; border-radius: 8px; text-decoration: none; font-weight: 600; margin: 20px 0; }
        .url-box { background: #f3f4f6; padding: 12px; border-radius: 6px; word-break: break-all; font-family: monospace; font-size: 12px; color: #6b7280; }
        .footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid #e5e7eb; font-size: 12px; color: #9ca3af; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Verificá tu email</h1>
        <p>Hola {{ user_name }}, hacé clic en el botón para confirmar que este email es tuyo:</p>
        <p style="text-align: center;">
            <a href="{{ verification_url }}" class="cta">Verificar email</a>
        </p>
        <div class="url-box">{{ verification_url }}</div>
        <div class="footer">
            <p>Este es un email automático. Por favor no respondas a este mensaje.</p>
        </div>
    </div>
</body>
</html>
