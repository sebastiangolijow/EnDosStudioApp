services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: stickerapp
      POSTGRES_USER: stickerapp
      POSTGRES_PASSWORD: stickerapp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stickerapp"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      args:
        REQUIREMENTS: dev
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DATABASE_URL: postgres://stickerapp:stickerapp@db:5432/stickerapp
      DJANGO_DEBUG: "True"
    env_file:
      - .env
    volumes:
      - .:/app
      - media:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  media:
